services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - app_storage:/var/www/html/storage
      - app_uploads:/var/www/html/public/uploads
    environment:
      APP_NAME: ${APP_NAME:-Shared Living Room Reservations}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-living_room}
      DB_USERNAME: ${DB_USERNAME:-living_room}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_database_password}
      DB_CHARSET: ${DB_CHARSET:-utf8mb4}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    init: true

  db:
    image: mariadb:11.4
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_me_root_password}
      MARIADB_DATABASE: ${DB_DATABASE:-living_room}
      MARIADB_USER: ${DB_USERNAME:-living_room}
      MARIADB_PASSWORD: ${DB_PASSWORD:-change_me_database_password}
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$$MARIADB_USER -p$$MARIADB_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mariadb_data:
  app_storage:
  app_uploads:
