services:
  app:
    # Mutable local development/deployment stack. Production container platforms
    # should rebuild from GitHub instead of using the in-app self-updater.
    build:
      context: .
      dockerfile: Dockerfile
    container_name: living-room-app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    restart: unless-stopped

  db:
    # MariaDB data is stored in a named volume so container recreation does not
    # wipe reservations, users, or installer-created schema state.
    image: mariadb:11.4
    container_name: living-room-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: living_room
      MYSQL_USER: living_room
      MYSQL_PASSWORD: living_room_password
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mariadb_data:
