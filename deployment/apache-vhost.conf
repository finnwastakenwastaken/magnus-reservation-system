<VirtualHost *:80>
    ServerName example.com
    ServerAlias www.example.com
    DocumentRoot /var/www/living-room/public

    <Directory /var/www/living-room/public>
        AllowOverride All
        Require all granted
        Options FollowSymLinks
        DirectoryIndex index.php
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/living-room-error.log
    CustomLog ${APACHE_LOG_DIR}/living-room-access.log combined
</VirtualHost>
